version: "1.0"
services:
  card-dev:
    container_name: card-dev
    build:
      target: development
    image: card:dev
    command: npm run dev
    cpus: 2
    mem_limit: 2048m
    ports:
      - "5000:8080"
    volumes:
      - ./src:/var/task/src
      - ./public:/var/task/public
    environment:
      STYLES_DIR: /var/task/styles
    env_file:
      - .env
  card-prod:
    container_name: card-prod
    build:
      target: production
    env_file:
      - .env
    image: card:prod
    cpus: 2
    mem_limit: 2048m
    ports:
      - "5000:8080"
