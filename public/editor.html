<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YGO Style Studio</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #9aa4b2;
    --accent: #5b8cff;
    --accent-2: #3a6df0;
    --danger: #ff6b6b;
    --ok: #4cd07d;
    --radius: 10px;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.45 "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 600px at 70% -10%, #1a2030 0%, var(--bg) 55%);
    display: flex; flex-direction: column;
  }
  button {
    font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 7px 12px; border-radius: 8px; cursor: pointer;
    transition: background .12s, border-color .12s, transform .04s;
  }
  button:hover { background: #262c38; border-color: #38415280; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent-2); border-color: var(--accent); }
  button.primary:hover { background: var(--accent); }
  button.ghost { background: transparent; }
  input, select, textarea {
    font: inherit; color: var(--text);
    background: #0e1117; border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 8px; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 64px; }
  select { cursor: pointer; }
  label { color: var(--muted); }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: rgba(20,23,30,.85);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border); z-index: 5;
  }
  .brand { font-weight: 700; letter-spacing: .3px; font-size: 15px; white-space: nowrap; }
  .brand .dot { color: var(--accent); }
  .topbar .grow { flex: 1; }
  .topbar .style-pick { display: flex; align-items: center; gap: 8px; min-width: 430px; }
  .topbar .style-pick select { width: auto; }
  #styleTypeSelect { min-width: 170px; }
  #styleNameSelect { min-width: 150px; }
  #status { font-size: 12px; color: var(--muted); min-width: 90px; text-align: right; }
  #status.ok { color: var(--ok); }
  #status.err { color: var(--danger); }

  /* Layout */
  .layout { flex: 1; display: flex; min-height: 0; }
  .sidebar {
    width: 360px; min-width: 320px; background: var(--panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0;
  }
  .tabs { display: flex; padding: 8px 8px 0; gap: 4px; border-bottom: 1px solid var(--border); }
  .tabs button {
    flex: 1; border: none; background: transparent; border-radius: 8px 8px 0 0;
    color: var(--muted); padding: 9px; border-bottom: 2px solid transparent;
  }
  .tabs button.active { color: var(--text); border-bottom-color: var(--accent); background: var(--panel-2); }
  .tabpanel { padding: 14px; overflow: auto; flex: 1; min-height: 0; }

  .field { margin-bottom: 11px; }
  .field > label { display: block; font-size: 12px; margin-bottom: 4px; }
  .row { display: flex; gap: 8px; }
  .row > .field { flex: 1; }
  .monster-type-list { display: flex; flex-direction: column; gap: 6px; }
  .monster-type-row { display: grid; grid-template-columns: 1fr 36px; gap: 6px; align-items: center; }
  .monster-type-row button, .monster-type-actions button { width: 36px; padding-left: 0; padding-right: 0; }
  .monster-type-actions { display: flex; justify-content: flex-end; }
  .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
  .check { display: flex; align-items: center; gap: 7px; color: var(--text); }
  .check input { width: auto; }
  .hint { color: var(--muted); font-size: 11.5px; margin: 4px 0 12px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 18px 0 8px; }

  /* Auto-generated style form */
  details.grp { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; background: var(--panel-2); }
  details.grp > summary {
    cursor: pointer; padding: 8px 10px; font-weight: 600; list-style: none;
    color: var(--text); user-select: none; display: flex; align-items: center; gap: 6px;
  }
  details.grp > summary::-webkit-details-marker { display: none; }
  details.grp > summary::before { content: "▸"; color: var(--muted); transition: transform .12s; }
  details.grp[open] > summary::before { transform: rotate(90deg); }
  .grp-body { padding: 4px 10px 10px; }
  .leaf { display: grid; grid-template-columns: 130px 1fr; gap: 8px; align-items: center; margin: 5px 0; }
  .leaf > label { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; }
  .leaf .with-color { display: flex; gap: 6px; }
  .leaf .with-color input[type=color] { width: 34px; padding: 2px; }
  .smallcaps-scale-editor {
    margin: 5px 0 8px; padding: 6px;
    border: 1px solid var(--border); border-radius: 7px; background: rgba(255,255,255,.018);
  }
  .smallcaps-scale-title { color: var(--muted); font-size: 12px; margin: 0 0 4px; }
  .attr-tools {
    display: grid; gap: 6px; margin: 2px 0 10px; padding: 7px;
    border: 1px dashed var(--border); border-radius: 7px; background: rgba(255,255,255,.025);
  }
  .attr-tool-row { display: grid; grid-template-columns: 1fr 34px; gap: 6px; }
  .attr-tool-row button { width: 34px; padding-left: 0; padding-right: 0; }

  /* Assets */
  .asset-group-title { font-size: 12px; color: var(--muted); margin: 14px 0 8px; text-transform: uppercase; letter-spacing: .6px; }
  .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(74px,1fr)); gap: 8px; }
  .asset {
    border: 1px solid var(--border); border-radius: 8px; padding: 6px; background: var(--panel-2);
    cursor: pointer; text-align: center; transition: border-color .12s;
  }
  .asset:hover { border-color: var(--accent); }
  .asset.pending { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(91,140,255,.35); }
  .asset.pending .name::after { content: " *"; color: var(--accent); }
  .asset .thumb {
    height: 54px; display: flex; align-items: center; justify-content: center;
    background: repeating-conic-gradient(#20242e 0% 25%, #181b22 0% 50%) 50% / 14px 14px;
    border-radius: 5px; overflow: hidden;
  }
  .asset .thumb img { max-width: 100%; max-height: 100%; }
  .asset .name { font-size: 10px; color: var(--muted); margin-top: 4px; word-break: break-all; line-height: 1.2; }
  .font-tools { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .font-tools button { flex: none; }
  .font-count { color: var(--muted); font-size: 12px; }
  .font-list { display: flex; flex-wrap: wrap; gap: 6px; max-height: 118px; overflow: auto; margin-bottom: 14px; }
  .font-chip {
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 7px;
    background: var(--panel-2); color: var(--muted); font-size: 11px;
  }

  /* Preview */
  .preview { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .preview-toolbar {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: rgba(20,23,30,.5);
  }
  .preview-toolbar .grow { flex: 1; }
  #renderStatus { font-size: 12px; color: var(--muted); }
  #renderStatus.err { color: var(--danger); }
  .sample-ctrl { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .sample-ctrl[hidden] { display: none; }
  .sample-ctrl input[type=range] { width: 160px; }
  .stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 22px; overflow: auto; min-height: 0;
  }
  .compare { position: relative; display: inline-block; line-height: 0; box-shadow: var(--shadow); border-radius: 6px; touch-action: none; user-select: none; }
  .compare img { -webkit-user-drag: none; user-drag: none; user-select: none; }
  .compare.has-sample img { pointer-events: none; }
  #renderedImg { position: relative; z-index: 1; display: block; max-height: calc(100vh - 170px); max-width: 100%; width: auto; height: auto; border-radius: 6px; }
  #sampleImg { position: absolute; z-index: 0; inset: 0; width: 100%; height: 100%; object-fit: fill; border-radius: 6px; }
  .divider {
    position: absolute; top: 0; bottom: 0; left: 50%; width: 0;
    border-left: 2px solid rgba(255,255,255,.9); box-shadow: 0 0 0 1px rgba(0,0,0,.4);
    pointer-events: none; z-index: 2;
  }
  .divider .handle {
    position: absolute; top: 50%; left: 0; transform: translate(-50%,-50%);
    width: 26px; height: 26px; border-radius: 50%; background: #fff; color: #111;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .compare.has-sample { cursor: ew-resize; }
  .compare .tag {
    position: absolute; top: 8px; font-size: 10px; letter-spacing: .5px; text-transform: uppercase;
    background: rgba(0,0,0,.55); color: #fff; padding: 2px 7px; border-radius: 20px; line-height: 1.4;
    z-index: 3;
  }
  .compare .tag.left { left: 8px; }
  .compare .tag.right { right: 8px; }
  .compare .tag { pointer-events: none; }
  .compare:not(.has-sample) .tag { display: none; }

  /* Dialog */
  dialog {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    border-radius: var(--radius); padding: 0; box-shadow: var(--shadow); width: 360px;
  }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  .dialog-body { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .dialog-body h3 { margin: 0; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
  .error { color: var(--danger); font-size: 12px; min-height: 14px; margin: 0; }
  .empty { color: var(--muted); font-size: 13px; padding: 20px 4px; text-align: center; }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">YGO Style<span class="dot"> ●</span> Studio</div>
    <div class="style-pick">
      <label for="styleTypeSelect">Section</label>
      <select id="styleTypeSelect"></select>
      <label for="styleNameSelect">Series</label>
      <select id="styleNameSelect"></select>
    </div>
    <button id="newBtn" class="ghost">+ New</button>
    <button id="renameBtn" class="ghost">Rename</button>
    <button id="loadZipBtn" class="ghost">Load ZIP</button>
    <div class="grow"></div>
    <button id="resetBtn" class="ghost">Reset</button>
    <button id="saveBtn">Save Style</button>
    <button id="zipBtn" class="primary">Download ZIP</button>
    <span id="status"></span>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="tabs">
        <button data-tab="card" class="active">Card</button>
        <button data-tab="style">Style</button>
        <button data-tab="assets">Assets</button>
      </div>
      <div class="tabpanel" id="panel-card"></div>
      <div class="tabpanel" id="panel-style" hidden></div>
      <div class="tabpanel" id="panel-assets" hidden></div>
    </aside>

    <section class="preview">
      <div class="preview-toolbar">
        <button id="loadArtBtn">Load Art</button>
        <button id="loadSampleBtn">Load Sample</button>
        <button id="clearSampleBtn" hidden>Clear Sample</button>
        <label class="sample-ctrl" id="renderOpacityCtrl" hidden>
          Opacity <input type="range" id="renderOpacityRange" min="0" max="100" value="100" aria-label="Render opacity">
        </label>
        <div class="grow"></div>
        <span id="renderStatus"></span>
      </div>
      <div class="stage">
        <div class="compare" id="compare">
          <span class="tag left">Sample</span>
          <span class="tag right">Rendered</span>
          <img id="renderedImg" alt="rendered card">
          <img id="sampleImg" hidden alt="sample">
          <div class="divider" id="divider" hidden><span class="handle">⇆</span></div>
        </div>
      </div>
    </section>
  </div>

  <input type="file" id="artFile" accept="image/*" hidden>
  <input type="file" id="sampleFile" accept="image/*" hidden>
  <input type="file" id="assetFile" accept="image/png" hidden>
  <input type="file" id="fontFile" accept=".ttf,.otf,font/ttf,font/otf,application/x-font-ttf,application/x-font-otf" hidden>
  <input type="file" id="zipFile" accept=".zip,application/zip,application/x-zip-compressed" hidden>

  <dialog id="newDialog">
    <form class="dialog-body" method="dialog">
      <h3>New style</h3>
      <div class="field">
        <label>Clone from</label>
        <select id="newBase"></select>
      </div>
      <div class="field">
        <label>Section</label>
        <input id="newSection" placeholder="OCG" autocomplete="off">
      </div>
      <div class="field">
        <label>Series</label>
        <input id="newSeries" placeholder="Series 14" autocomplete="off">
      </div>
      <p class="hint">Section and series are shown in the picker. Assets and settings are copied from the chosen style.</p>
      <p class="error" id="newError"></p>
      <div class="dialog-actions">
        <button value="cancel" class="ghost">Cancel</button>
        <button id="newCreate" class="primary">Create</button>
      </div>
    </form>
  </dialog>

  <dialog id="renameDialog">
    <form class="dialog-body" method="dialog">
      <h3>Rename style</h3>
      <div class="field">
        <label>Series</label>
        <input id="renameName" placeholder="Series 14" autocomplete="off">
      </div>
      <p class="hint">Renames the selected series inside its current section.</p>
      <p class="error" id="renameError"></p>
      <div class="dialog-actions">
        <button value="cancel" class="ghost">Cancel</button>
        <button id="renameSave" class="primary">Rename</button>
      </div>
    </form>
  </dialog>

<script>
"use strict";

const PLACEHOLDER_ART = "iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAIAAABLbSncAAAACXBIWXMAAAPoAAAD6AG1e1JrAAAAD0lEQVR4nGP4jwMwDC0JALoev0Ewkwr8AAAAAElFTkSuQmCC";

const ATTRIBUTES = ["LIGHT","DARK","WIND","FIRE","EARTH","WATER","DIVINE","SPELL","TRAP","LAUGH"];
const STYLE_SECTION_ORDER = ["OCG","TCG","Duel Links (Speed)","Duel Links (Rush Duel)"];
const TEMPLATES = ["normal","effect","ritual","fusion","synchro","xyz","link","spell","trap","token"];
const SPELLTRAP_TEMPLATES = ["spell","trap"];
const ICONS = ["normal","continuous","counter","equip","field","quick-play","ritual"];
const LINK_ARROWS = ["Top","Top-Right","Right","Bottom-Right","Bottom","Bottom-Left","Left","Top-Left"];
const DEBUG_TEXTBOX_BACKGROUND = "#ff0000";
const TEXT_OPTION_ATTRIBUTES = [
  "width",
  "height",
  "size",
  "fontFamily",
  "fit",
  "scaleX",
  "scaleY",
  "lineHeight",
  "weight",
  "opacity",
  "color",
  "left",
  "top",
  "spacing",
  "letterSpacing",
  "wordSpacing",
  "align",
  "background",
  "normalizeSlashSpacing",
  "trimLineEndings",
  "justifyLineEndings",
  "justifyLastLine",
  "maxLineWordSpacing",
  "minLineFillRatio",
  "sizeScaleYFit",
  "allCaps",
  "smallCaps",
  "smallCapsScale",
  "smallCapsStroke",
  "thin",
  "stroke",
  "outline",
  "overrush",
  "brackets",
];
const NON_REMOVABLE_TEXT_OPTION_ATTRIBUTES = new Set(["width", "height"]);
const TEXT_OPTION_GROUP_NAMES = new Set(["name", "type", "text", "textSpell", "pendulumText", "stat", "statLabel", "scale", "linkRating", "levelString"]);
const BRACKET_OPTION_ATTRIBUTES = ["size", "fontFamily", "scaleX", "scaleY"];
const SVG_ATTRIBUTE_NAME_PATTERN = /^[A-Za-z_][A-Za-z0-9_.:-]*$/;

const $ = (sel, root) => (root || document).querySelector(sel);
const isValidStyleName = (name) => typeof name === "string" && /^[^<>:"/\\|?*\x00-\x1F]+$/.test(name.trim());

const state = {
  styles: [],
  current: null,            // { type, section, name }
  settings: {},             // raw settings being edited
  fonts: [],
  assets: { icons: [], template: [] },
  stagedAssets: { icons: {}, template: {} },
  dirty: false,
  artBase64: PLACEHOLDER_ART,
  artLoaded: false,
  sampleUrl: null,
  split: 50,
  renderOpacity: 100,
  card: {
    name: "Blue-Eyes White Dragon",
    attribute: "LIGHT",
    template: "normal",
    level: 8,
    scale: 4,
    monsterType: ["Dragon", "Normal"],
    atk: "3000",
    def: "2500",
    maxAtk: "",
    cardText: "This legendary dragon is a powerful engine of destruction. Virtually invincible, very few have faced this awesome creature and lived to tell the tale.",
    pendulumText: "",
    icon: "normal",
    linkArrows: [],
    pendulum: false,
    legend: false,
    fullArt: false,
    disableStats: false,
    overrushName: false,
  },
};

let renderTimer = null;
let rendering = false;
let renderQueued = false;
let lastObjectUrl = null;

function setStatus(msg, kind) {
  const el = $("#status");
  el.textContent = msg || "";
  el.className = kind || "";
}
function setRenderStatus(msg, isErr) {
  const el = $("#renderStatus");
  el.textContent = msg || "";
  el.className = isErr ? "err" : "";
}
function resetStagedAssets() {
  state.stagedAssets = { icons: {}, template: {} };
}
function stagedAssetData(area, file) {
  return state.stagedAssets[area] && state.stagedAssets[area][file];
}
function markDirty() {
  state.dirty = true;
  setStatus("Unsaved changes");
}
function clearDirty() {
  state.dirty = false;
}
function scheduleStyleRender(immediate) {
  markDirty();
  scheduleRender(immediate);
}

/* ----------------------------------------------------------------------- API */
async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    const text = await res.text().catch(() => res.statusText);
    throw new Error(text || ("HTTP " + res.status));
  }
  return res;
}

async function loadStyleList() {
  const data = await (await api("/api/editor/styles")).json();
  state.styles = data.styles || [];
  syncStyleControls(state.current);
}

function styleKey(style) {
  return JSON.stringify({ section: style.section, name: style.name });
}

function findStyle(section, name) {
  return state.styles.find((s) => s.section === section && s.name === name) || null;
}

function splitStyleKey(value) {
  try {
    const parsed = JSON.parse(value);
    return parsed && parsed.section && parsed.name ? parsed : null;
  } catch (e) {
    return null;
  }
}

function availableStyleSections() {
  const seen = new Set();
  const ordered = [];
  for (const preferred of STYLE_SECTION_ORDER) {
    if (state.styles.some((s) => s.section === preferred)) {
      seen.add(preferred);
      ordered.push(preferred);
    }
  }
  for (const s of state.styles) {
    if (!seen.has(s.section)) {
      seen.add(s.section);
      ordered.push(s.section);
    }
  }
  return ordered;
}

function stylesForSection(section) {
  return state.styles.filter((s) => s.section === section);
}

function seriesOptionText(style, styles) {
  const duplicates = styles.filter((s) => s.name === style.name);
  return duplicates.length > 1 ? style.name + " (" + style.type + ")" : style.name;
}

function displayStyleRef(section, name) {
  return section && name ? section + " / " + name : "";
}

function syncStyleControls(preferred) {
  const sectionSel = $("#styleTypeSelect");
  const seriesSel = $("#styleNameSelect");
  const sections = availableStyleSections();
  const requestedStyle = preferred && preferred.section && preferred.name ? findStyle(preferred.section, preferred.name) : null;
  const requestedSection = requestedStyle ? requestedStyle.section : (preferred && preferred.section);
  const selectedSection = sections.includes(requestedSection) ? requestedSection : (sections[0] || "");

  sectionSel.innerHTML = "";
  for (const section of sections) {
    const opt = document.createElement("option");
    opt.value = section;
    opt.textContent = section;
    sectionSel.appendChild(opt);
  }
  sectionSel.value = selectedSection;

  const styles = stylesForSection(selectedSection);
  const selectedStyle =
    requestedStyle && styles.some((s) => s.section === requestedStyle.section && s.name === requestedStyle.name)
      ? requestedStyle
      : (styles[0] || null);
  seriesSel.innerHTML = "";
  for (const s of styles) {
    const opt = document.createElement("option");
    opt.value = styleKey(s);
    opt.textContent = seriesOptionText(s, styles);
    opt.title = s.type;
    seriesSel.appendChild(opt);
  }
  if (selectedStyle) seriesSel.value = styleKey(selectedStyle);
  return selectedStyle ? { type: selectedStyle.type, section: selectedStyle.section, name: selectedStyle.name } : null;
}

async function loadStyle(section, name) {
  const data = await (await api("/api/editor/styles/" + encodeURIComponent(section) + "/" + encodeURIComponent(name))).json();
  state.current = { type: data.type, section: data.section, name: data.name };
  state.settings = data.settings || {};
  normalizeStyleEditorSettings(state.settings);
  state.fonts = data.fonts || [];
  state.assets = data.assets || { icons: [], template: [] };
  resetStagedAssets();
  clearDirty();
  syncStyleControls(state.current);
  buildStyleForm();
  buildAssets();
  scheduleRender(true);
}

/* ---------------------------------------------------------------- Card panel */
function makeField(labelText, inputEl) {
  const wrap = document.createElement("div");
  wrap.className = "field";
  const label = document.createElement("label");
  label.textContent = labelText;
  wrap.appendChild(label);
  wrap.appendChild(inputEl);
  return wrap;
}
function makeSelect(options, value, onChange) {
  const sel = document.createElement("select");
  for (const o of options) {
    const opt = document.createElement("option");
    opt.value = o; opt.textContent = o;
    sel.appendChild(opt);
  }
  sel.value = value;
  sel.addEventListener("change", () => onChange(sel.value));
  return sel;
}
function makeFontSelect(value, onChange) {
  const sel = document.createElement("select");
  const selectedValue = String(value == null ? "" : value);
  const fonts = state.fonts || [];

  if (selectedValue && !fonts.includes(selectedValue)) {
    const opt = document.createElement("option");
    opt.value = selectedValue;
    opt.textContent = selectedValue + " (missing)";
    opt.disabled = true;
    sel.appendChild(opt);
  }

  for (const font of fonts) {
    const opt = document.createElement("option");
    opt.value = font;
    opt.textContent = font;
    sel.appendChild(opt);
  }

  if (!fonts.length && !selectedValue) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "No loaded fonts";
    opt.disabled = true;
    sel.appendChild(opt);
  }

  sel.value = selectedValue;
  sel.addEventListener("change", () => onChange(sel.value));
  return sel;
}
function makeInput(type, value, onChange) {
  const inp = document.createElement("input");
  inp.type = type;
  inp.value = value;
  inp.addEventListener("input", () => onChange(inp.value));
  return inp;
}
function makeTextarea(value, onChange) {
  const ta = document.createElement("textarea");
  ta.value = value;
  ta.addEventListener("input", () => onChange(ta.value));
  return ta;
}
function makeCheck(labelText, checked, onChange) {
  const wrap = document.createElement("label");
  wrap.className = "check";
  const inp = document.createElement("input");
  inp.type = "checkbox"; inp.checked = checked;
  inp.addEventListener("change", () => onChange(inp.checked));
  wrap.appendChild(inp);
  wrap.appendChild(document.createTextNode(labelText));
  return wrap;
}
function normalizeMonsterTypes(value) {
  if (Array.isArray(value)) {
    const types = value.map((type) => String(type == null ? "" : type));
    return types.length ? types : [""];
  }
  if (typeof value === "string") {
    const trimmed = value.trim();
    if (!trimmed) return [""];
    const unwrapped = trimmed.startsWith("[") && trimmed.endsWith("]") ? trimmed.slice(1, -1) : trimmed;
    const types = unwrapped.split("/").map((type) => type.trim()).filter(Boolean);
    return types.length ? types : [trimmed];
  }
  return [""];
}
function setMonsterTypes(types) {
  state.card.monsterType = types.length ? types : [""];
}
function makeMonsterTypeEditor() {
  const types = normalizeMonsterTypes(state.card.monsterType);
  setMonsterTypes(types);

  const wrap = document.createElement("div");
  wrap.className = "monster-type-list";

  types.forEach((value, index) => {
    const row = document.createElement("div");
    row.className = "monster-type-row";
    const input = makeInput("text", value, (nextValue) => {
      const nextTypes = normalizeMonsterTypes(state.card.monsterType);
      nextTypes[index] = nextValue;
      setMonsterTypes(nextTypes);
      scheduleRender();
    });
    input.setAttribute("aria-label", "Monster type " + (index + 1));
    const remove = document.createElement("button");
    remove.type = "button";
    remove.textContent = "-";
    remove.title = "Remove type";
    remove.disabled = types.length <= 1;
    remove.addEventListener("click", () => {
      if (types.length <= 1) return;
      const nextTypes = normalizeMonsterTypes(state.card.monsterType);
      nextTypes.splice(index, 1);
      setMonsterTypes(nextTypes);
      buildCardPanel();
      scheduleRender();
    });
    row.appendChild(input);
    row.appendChild(remove);
    wrap.appendChild(row);
  });

  const actions = document.createElement("div");
  actions.className = "monster-type-actions";
  const add = document.createElement("button");
  add.type = "button";
  add.textContent = "+";
  add.title = "Add type";
  add.addEventListener("click", () => {
    const nextTypes = normalizeMonsterTypes(state.card.monsterType);
    nextTypes.push("");
    setMonsterTypes(nextTypes);
    buildCardPanel();
    scheduleRender();
  });
  actions.appendChild(add);
  wrap.appendChild(actions);

  return wrap;
}

function buildCardPanel() {
  const p = $("#panel-card");
  p.innerHTML = "";
  const c = state.card;
  const upd = (k) => (v) => { c[k] = v; scheduleRender(); };

  p.appendChild(makeField("Card name", makeInput("text", c.name, upd("name"))));

  const row1 = document.createElement("div"); row1.className = "row";
  row1.appendChild(makeField("Template", makeSelect(TEMPLATES, c.template, (v) => {
    c.template = v;
    normalizeForTemplate();
    buildCardPanel();
    scheduleRender();
  })));
  row1.appendChild(makeField("Attribute", makeSelect(ATTRIBUTES, c.attribute, upd("attribute"))));
  p.appendChild(row1);

  const isSpellTrap = SPELLTRAP_TEMPLATES.includes(c.template);

  if (isSpellTrap) {
    p.appendChild(makeField("Spell/Trap icon", makeSelect(ICONS, c.icon, upd("icon"))));
  } else {
    p.appendChild(makeField("Monster type", makeMonsterTypeEditor()));
    const row2 = document.createElement("div"); row2.className = "row";
    row2.appendChild(makeField("Level / Rank (0-13)", makeInput("number", c.level, (v) => { c.level = clampNum(v,0,13); scheduleRender(); })));
    row2.appendChild(makeField("ATK", makeInput("text", c.atk, upd("atk"))));
    if (c.template !== "link") row2.appendChild(makeField("DEF", makeInput("text", c.def, upd("def"))));
    p.appendChild(row2);
  }

  p.appendChild(makeField(isSpellTrap ? "Card text" : "Monster / effect text", makeTextarea(c.cardText, upd("cardText"))));

  if (!isSpellTrap) {
    // Pendulum
    const pendWrap = document.createElement("div"); pendWrap.className = "field";
    pendWrap.appendChild(makeCheck("Pendulum monster", c.pendulum, (v) => { c.pendulum = v; buildCardPanel(); scheduleRender(); }));
    p.appendChild(pendWrap);
    if (c.pendulum) {
      p.appendChild(makeField("Pendulum scale (0-14)", makeInput("number", c.scale, (v) => { c.scale = clampNum(v,0,14); scheduleRender(); })));
      p.appendChild(makeField("Pendulum text", makeTextarea(c.pendulumText, upd("pendulumText"))));
    }
    if (c.template === "link") {
      const sec = document.createElement("div");
      sec.className = "section-title"; sec.textContent = "Link arrows";
      p.appendChild(sec);
      const grid = document.createElement("div"); grid.className = "checks";
      for (const arrow of LINK_ARROWS) {
        grid.appendChild(makeCheck(arrow, c.linkArrows.includes(arrow), (v) => {
          if (v) { if (!c.linkArrows.includes(arrow)) c.linkArrows.push(arrow); }
          else c.linkArrows = c.linkArrows.filter((a) => a !== arrow);
          scheduleRender();
        }));
      }
      p.appendChild(grid);
    }
  }

  // Flags
  const sec = document.createElement("div");
  sec.className = "section-title"; sec.textContent = "Options";
  p.appendChild(sec);
  const flags = document.createElement("div"); flags.className = "checks";
  flags.appendChild(makeCheck("Full art", c.fullArt, (v) => { c.fullArt = v; scheduleRender(); }));
  flags.appendChild(makeCheck("Disable stats", c.disableStats, (v) => { c.disableStats = v; scheduleRender(); }));
  flags.appendChild(makeCheck("Legend", c.legend, (v) => { c.legend = v; scheduleRender(); }));
  flags.appendChild(makeCheck("Over-Rush name", c.overrushName, (v) => { c.overrushName = v; scheduleRender(); }));
  p.appendChild(flags);

  if (!isSpellTrap && (c.template !== "link")) {
    const r = document.createElement("div"); r.className = "row";
    r.appendChild(makeField("Max ATK (Rush)", makeInput("text", c.maxAtk, upd("maxAtk"))));
    p.appendChild(r);
  }

  if (!state.artLoaded) {
    const note = document.createElement("p");
    note.className = "hint";
    note.textContent = "Using placeholder art — click “Load Art” to preview with your own image.";
    p.appendChild(note);
  }
}

function clampNum(v, lo, hi) {
  let n = parseInt(v, 10);
  if (!Number.isFinite(n)) n = 0;
  return Math.max(lo, Math.min(hi, n));
}

function normalizeForTemplate() {
  const c = state.card;
  if (c.template === "spell") { if (!["SPELL"].includes(c.attribute)) c.attribute = "SPELL"; }
  else if (c.template === "trap") { if (!["TRAP"].includes(c.attribute)) c.attribute = "TRAP"; }
  else if (c.attribute === "SPELL" || c.attribute === "TRAP") { c.attribute = "LIGHT"; }
}

/* --------------------------------------------------------------- Style form */
function setByPath(obj, keys, value) {
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) cur = cur[keys[i]];
  cur[keys[keys.length - 1]] = value;
}

function getByPath(obj, keys) {
  let cur = obj;
  for (const key of keys) {
    if (!isObjectRecord(cur)) return undefined;
    cur = cur[key];
  }
  return cur;
}

function isObjectRecord(value) {
  return value !== null && typeof value === "object" && !Array.isArray(value);
}

function normalizeStyleEditorSettings(value) {
  if (!isObjectRecord(value)) return;
  for (const key of Object.keys(value)) {
    if (key === "smallCapsScale" && typeof value[key] === "number") {
      value[key] = { scaleX: value[key], scaleY: value[key] };
    } else {
      normalizeStyleEditorSettings(value[key]);
    }
  }
}

function isTextRenderOptions(value, keys) {
  return isObjectRecord(value)
    && typeof value.width === "number"
    && typeof value.height === "number"
    && (typeof value.fontFamily === "string" || TEXT_OPTION_GROUP_NAMES.has(keys[keys.length - 1]));
}

function copyValue(value) {
  if (!isObjectRecord(value) && !Array.isArray(value)) return value;
  return JSON.parse(JSON.stringify(value));
}

function defaultTextOptionAttributeValue(key, options) {
  const font = options.fontFamily || state.fonts[0] || "Arial";
  const size = Number.isFinite(Number(options.size)) ? Number(options.size) : 10;
  const defaults = {
    width: 100,
    height: 40,
    size: 10,
    fontFamily: font,
    fit: "container",
    scaleX: 1,
    scaleY: 1,
    lineHeight: 1,
    weight: 400,
    opacity: 1,
    color: "black",
    left: 0,
    top: 0,
    spacing: 0,
    letterSpacing: 0,
    wordSpacing: 0,
    align: "left",
    background: DEBUG_TEXTBOX_BACKGROUND,
    normalizeSlashSpacing: true,
    trimLineEndings: false,
    justifyLineEndings: false,
    justifyLastLine: false,
    maxLineWordSpacing: 7,
    minLineFillRatio: 0.75,
    sizeScaleYFit: {
      maxScaleY: 1.25,
      targetHeightRatio: 1,
      fullScaleAtSizeReduction: 0,
      trimLineEndings: true,
      justifyLineEndings: true,
      justifyLastLine: false,
      maxLineWordSpacing: 7,
      minLineFillRatio: 0.75,
    },
    allCaps: false,
    smallCaps: false,
    smallCapsScale: { scaleX: 0.8, scaleY: 0.8 },
    smallCapsStroke: 0,
    thin: 0,
    stroke: 0,
    outline: { width: 1, color: "black" },
    overrush: false,
    brackets: { size, fontFamily: font, scaleX: 1, scaleY: 1 },
  };
  return copyValue(defaults[key]);
}

function getOpenStyleGroupPaths() {
  return new Set(Array.from(document.querySelectorAll("#panel-style details.grp[open]")).map((el) => el.dataset.path));
}

function rebuildStyleFormKeepingOpen() {
  buildStyleForm(getOpenStyleGroupPaths());
}

function makeAttributeSelect(keys, placeholder) {
  const sel = document.createElement("select");
  sel.setAttribute("aria-label", placeholder);
  const intro = document.createElement("option");
  intro.value = "";
  intro.textContent = placeholder;
  intro.disabled = true;
  sel.appendChild(intro);
  for (const key of keys) {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = key;
    sel.appendChild(opt);
  }
  sel.value = "";
  return sel;
}

function makeTextOptionAttributeTools(options) {
  const wrap = document.createElement("div");
  wrap.className = "attr-tools";

  const missing = TEXT_OPTION_ATTRIBUTES.filter((key) => !(key in options));
  const addRow = document.createElement("div");
  addRow.className = "attr-tool-row";
  const addSelect = makeAttributeSelect(missing, "Add attribute");
  const add = document.createElement("button");
  add.type = "button";
  add.textContent = "+";
  add.title = "Add selected text attribute";
  add.disabled = missing.length === 0;
  add.addEventListener("click", () => {
    if (!addSelect.value) return;
    options[addSelect.value] = defaultTextOptionAttributeValue(addSelect.value, options);
    rebuildStyleFormKeepingOpen();
    scheduleStyleRender(true);
  });
  addRow.appendChild(addSelect);
  addRow.appendChild(add);
  wrap.appendChild(addRow);

  const removable = TEXT_OPTION_ATTRIBUTES.filter((key) => key in options && !NON_REMOVABLE_TEXT_OPTION_ATTRIBUTES.has(key));
  const removeRow = document.createElement("div");
  removeRow.className = "attr-tool-row";
  const removeSelect = makeAttributeSelect(removable, "Remove attribute");
  const remove = document.createElement("button");
  remove.type = "button";
  remove.textContent = "-";
  remove.title = "Remove selected text attribute";
  remove.disabled = removable.length === 0;
  remove.addEventListener("click", () => {
    if (!removeSelect.value) return;
    delete options[removeSelect.value];
    rebuildStyleFormKeepingOpen();
    scheduleStyleRender(true);
  });
  removeRow.appendChild(removeSelect);
  removeRow.appendChild(remove);
  wrap.appendChild(removeRow);

  return wrap;
}

function defaultBracketOptionAttributeValue(key, keys) {
  const parent = getByPath(state.settings, keys.slice(0, -1));
  const font = (isObjectRecord(parent) && parent.fontFamily) || state.fonts[0] || "Arial";
  const size = isObjectRecord(parent) && Number.isFinite(Number(parent.size)) ? Number(parent.size) : 10;
  const defaults = {
    size,
    fontFamily: font,
    scaleX: 1,
    scaleY: 1,
  };
  return copyValue(defaults[key]);
}

function isBracketPropertyName(value) {
  return typeof value === "string" && SVG_ATTRIBUTE_NAME_PATTERN.test(value);
}

function makeBracketPropertyTools(options, keys) {
  const wrap = document.createElement("div");
  wrap.className = "attr-tools";

  const missing = BRACKET_OPTION_ATTRIBUTES.filter((key) => !(key in options));
  const addKnownRow = document.createElement("div");
  addKnownRow.className = "attr-tool-row";
  const addKnownSelect = makeAttributeSelect(missing, "Add bracket prop");
  const addKnown = document.createElement("button");
  addKnown.type = "button";
  addKnown.textContent = "+";
  addKnown.title = "Add selected bracket property";
  addKnown.disabled = missing.length === 0;
  addKnown.addEventListener("click", () => {
    if (!addKnownSelect.value) return;
    options[addKnownSelect.value] = defaultBracketOptionAttributeValue(addKnownSelect.value, keys);
    rebuildStyleFormKeepingOpen();
    scheduleStyleRender(true);
  });
  addKnownRow.appendChild(addKnownSelect);
  addKnownRow.appendChild(addKnown);
  wrap.appendChild(addKnownRow);

  const addCustomRow = document.createElement("div");
  addCustomRow.className = "attr-tool-row";
  const customInput = document.createElement("input");
  customInput.type = "text";
  customInput.placeholder = "Custom SVG attr";
  const addCustom = document.createElement("button");
  addCustom.type = "button";
  addCustom.textContent = "+";
  addCustom.title = "Add custom bracket property";
  addCustom.addEventListener("click", () => {
    const name = customInput.value.trim();
    if (!isBracketPropertyName(name) || name in options) {
      customInput.style.borderColor = "var(--danger)";
      return;
    }
    customInput.style.borderColor = "";
    options[name] = BRACKET_OPTION_ATTRIBUTES.includes(name)
      ? defaultBracketOptionAttributeValue(name, keys)
      : "";
    rebuildStyleFormKeepingOpen();
    scheduleStyleRender(true);
  });
  customInput.addEventListener("input", () => { customInput.style.borderColor = ""; });
  addCustomRow.appendChild(customInput);
  addCustomRow.appendChild(addCustom);
  wrap.appendChild(addCustomRow);

  const removable = Object.keys(options);
  const removeRow = document.createElement("div");
  removeRow.className = "attr-tool-row";
  const removeSelect = makeAttributeSelect(removable, "Remove bracket prop");
  const remove = document.createElement("button");
  remove.type = "button";
  remove.textContent = "-";
  remove.title = "Remove selected bracket property";
  remove.disabled = removable.length === 0;
  remove.addEventListener("click", () => {
    if (!removeSelect.value) return;
    delete options[removeSelect.value];
    rebuildStyleFormKeepingOpen();
    scheduleStyleRender(true);
  });
  removeRow.appendChild(removeSelect);
  removeRow.appendChild(remove);
  wrap.appendChild(removeRow);

  return wrap;
}

function buildStyleForm(openGroups) {
  const p = $("#panel-style");
  p.innerHTML = "";
  if (!state.settings || typeof state.settings !== "object") {
    p.innerHTML = '<p class="empty">No settings loaded.</p>';
    return;
  }
  ensureStyleEditorDefaults(state.settings);
  const intro = document.createElement("p");
  intro.className = "hint";
  intro.textContent = "Edit any value to update the preview live. Use Save Style to write changes to disk.";
  p.appendChild(intro);

  for (const key of Object.keys(state.settings)) {
    if (key === "styleName") continue;
    p.appendChild(renderNode(key, state.settings[key], [key], openGroups));
  }
}

function ensureStyleEditorDefaults(settings) {
  const typeOptions = settings.type;
  if (typeOptions && typeof typeOptions === "object" && !Array.isArray(typeOptions)) {
    if (!("color" in typeOptions)) typeOptions.color = "black";
    if (!("thin" in typeOptions)) typeOptions.thin = 0;
  }
}

function isFontFamilyField(key) {
  return key.toLowerCase().startsWith("fontfamily");
}

function isSmallCapsScaleNode(key, value) {
  return key === "smallCapsScale"
    && isObjectRecord(value)
    && typeof value.scaleX === "number"
    && typeof value.scaleY === "number";
}

function renderSmallCapsScaleEditor(value, keys) {
  const wrap = document.createElement("div");
  wrap.className = "smallcaps-scale-editor";
  const title = document.createElement("div");
  title.className = "smallcaps-scale-title";
  title.textContent = "smallCapsScale";
  title.title = keys.join(".");
  wrap.appendChild(title);

  let scaleInput;
  let scaleXInput;
  let scaleYInput;
  const formatScale = () => value.scaleX === value.scaleY ? String(value.scaleX) : "--";
  const parsePositiveNumber = (input) => {
    const n = parseFloat(input.value);
    const valid = Number.isFinite(n) && n > 0;
    input.style.borderColor = valid ? "" : "var(--danger)";
    return valid ? n : null;
  };
  const refreshScaleInput = () => {
    scaleInput.value = formatScale();
    scaleInput.style.borderColor = "";
  };
  const makeRow = (labelText, titleText, input) => {
    const row = document.createElement("div");
    row.className = "leaf";
    const label = document.createElement("label");
    label.textContent = labelText;
    label.title = titleText;
    row.appendChild(label);
    row.appendChild(input);
    return row;
  };
  const makeAxisInput = (axis) => {
    const input = document.createElement("input");
    input.type = "number";
    input.step = "any";
    input.min = "0";
    input.value = value[axis];
    input.addEventListener("input", () => {
      const n = parsePositiveNumber(input);
      if (n === null) return;
      value[axis] = n;
      refreshScaleInput();
      setByPath(state.settings, keys, value);
      scheduleStyleRender();
    });
    return input;
  };

  scaleInput = document.createElement("input");
  scaleInput.type = "text";
  scaleInput.value = formatScale();
  scaleInput.addEventListener("focus", () => {
    if (scaleInput.value === "--") scaleInput.select();
  });
  scaleInput.addEventListener("input", () => {
    if (scaleInput.value.trim() === "--") {
      scaleInput.style.borderColor = "";
      return;
    }
    const n = parsePositiveNumber(scaleInput);
    if (n === null) return;
    value.scaleX = n;
    value.scaleY = n;
    scaleXInput.value = n;
    scaleYInput.value = n;
    setByPath(state.settings, keys, value);
    scheduleStyleRender();
  });

  scaleXInput = makeAxisInput("scaleX");
  scaleYInput = makeAxisInput("scaleY");

  wrap.appendChild(makeRow("scale", keys.concat("scale").join("."), scaleInput));
  wrap.appendChild(makeRow("scaleX", keys.concat("scaleX").join("."), scaleXInput));
  wrap.appendChild(makeRow("scaleY", keys.concat("scaleY").join("."), scaleYInput));
  return wrap;
}

function renderNode(key, value, keys, openGroups) {
  if (isSmallCapsScaleNode(key, value)) {
    return renderSmallCapsScaleEditor(value, keys);
  }
  if (value !== null && typeof value === "object" && !Array.isArray(value)) {
    const details = document.createElement("details");
    details.className = "grp";
    details.dataset.path = keys.join(".");
    if (openGroups && openGroups.has(details.dataset.path)) details.open = true;
    else if (keys.length === 1) details.open = false;
    const summary = document.createElement("summary");
    summary.textContent = key;
    details.appendChild(summary);
    const body = document.createElement("div");
    body.className = "grp-body";
    if (isTextRenderOptions(value, keys)) {
      body.appendChild(makeTextOptionAttributeTools(value));
    }
    if (key === "brackets") {
      body.appendChild(makeBracketPropertyTools(value, keys));
    }
    for (const childKey of Object.keys(value)) {
      body.appendChild(renderNode(childKey, value[childKey], keys.concat(childKey), openGroups));
    }
    details.appendChild(body);
    return details;
  }
  return renderLeaf(key, value, keys);
}

function renderLeaf(key, value, keys) {
  const row = document.createElement("div");
  row.className = "leaf";
  const label = document.createElement("label");
  label.textContent = key;
  label.title = keys.join(".");
  row.appendChild(label);

  if (typeof value === "boolean") {
    const inp = document.createElement("input");
    inp.type = "checkbox"; inp.checked = value; inp.style.width = "auto";
    inp.addEventListener("change", () => { setByPath(state.settings, keys, inp.checked); scheduleStyleRender(); });
    row.appendChild(inp);
  } else if (typeof value === "number") {
    const inp = document.createElement("input");
    inp.type = "number"; inp.step = "any"; inp.value = value;
    inp.addEventListener("input", () => {
      const n = parseFloat(inp.value);
      if (Number.isFinite(n)) { setByPath(state.settings, keys, n); scheduleStyleRender(); }
    });
    row.appendChild(inp);
  } else if (Array.isArray(value)) {
    const ta = document.createElement("textarea");
    ta.value = JSON.stringify(value);
    ta.addEventListener("input", () => {
      try { setByPath(state.settings, keys, JSON.parse(ta.value)); ta.style.borderColor = ""; scheduleStyleRender(); }
      catch { ta.style.borderColor = "var(--danger)"; }
    });
    row.appendChild(ta);
  } else {
    const lower = key.toLowerCase();
    if (isFontFamilyField(key)) {
      row.appendChild(makeFontSelect(value, (nextValue) => {
        setByPath(state.settings, keys, nextValue);
        scheduleStyleRender();
      }));
    } else if (lower.includes("color") || lower.includes("background")) {
      const wrap = document.createElement("div");
      wrap.className = "with-color";
      const text = document.createElement("input");
      text.type = "text"; text.value = value;
      const color = document.createElement("input");
      color.type = "color";
      try { if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(value)) color.value = value; } catch (e) {}
      text.addEventListener("input", () => { setByPath(state.settings, keys, text.value); scheduleStyleRender(); });
      color.addEventListener("input", () => { text.value = color.value; setByPath(state.settings, keys, color.value); scheduleStyleRender(); });
      wrap.appendChild(text); wrap.appendChild(color);
      row.appendChild(wrap);
    } else {
      const inp = document.createElement("input");
      inp.type = "text"; inp.value = value;
      inp.addEventListener("input", () => { setByPath(state.settings, keys, inp.value); scheduleStyleRender(); });
      row.appendChild(inp);
    }
  }
  return row;
}

/* ------------------------------------------------------------------- Assets */
function buildAssets() {
  const p = $("#panel-assets");
  p.innerHTML = "";
  const intro = document.createElement("p");
  intro.className = "hint";
  intro.textContent = "Click any asset to stage a replacement PNG. Use Save Style to write staged assets to disk.";

      grid.appendChild(makeAssetCell(area, file));
    }
    p.appendChild(grid);
  }
}

function buildFontTools(parent) {
  const title = document.createElement("div");
  title.className = "asset-group-title";
  title.textContent = "fonts (" + (state.fonts || []).length + ")";
  parent.appendChild(title);

  const tools = document.createElement("div");
  tools.className = "font-tools";
  const button = document.createElement("button");
  button.type = "button";
  button.textContent = "Load Font";
  button.addEventListener("click", chooseFontFile);
  const count = document.createElement("span");
  count.className = "font-count";
  count.textContent = "TTF or OTF";
  tools.appendChild(button);
  tools.appendChild(count);
  parent.appendChild(tools);

  const list = document.createElement("div");
  list.className = "font-list";
  for (const font of state.fonts || []) {
    const chip = document.createElement("span");
    chip.className = "font-chip";
    chip.textContent = font;
    chip.title = font;
    list.appendChild(chip);
  }
  if (!list.children.length) {
    const empty = document.createElement("span");
    empty.className = "font-count";
    empty.textContent = "No loaded fonts";
    list.appendChild(empty);
  }
  parent.appendChild(list);
}

function makeAssetCell(area, file) {
  const cell = document.createElement("div");
  cell.className = "asset";
  cell.title = "Replace " + area + "/" + file;
  if (stagedAssetData(area, file)) cell.classList.add("pending");
  const thumb = document.createElement("div");
  thumb.className = "thumb";
  const img = document.createElement("img");
  img.src = stagedAssetData(area, file) || assetUrl(area, file);
  img.loading = "lazy";
  thumb.appendChild(img);
  const name = document.createElement("div");
  name.className = "name";
  name.textContent = file;
  cell.appendChild(thumb);
  cell.appendChild(name);
  cell.addEventListener("click", () => replaceAsset(area, file, img));
  return cell;
}

function assetUrl(area, file, bust) {
  const c = state.current;
  return "/api/editor/styles/" + encodeURIComponent(c.section) + "/" + encodeURIComponent(c.name) + "/asset/" + area + "/" + encodeURIComponent(file) + (bust ? ("?t=" + bust) : "");
}

function replaceAsset(area, file, imgEl) {
  const input = $("#assetFile");
  input.value = "";
  input.onchange = async () => {
    const f = input.files[0];
    if (!f) return;
    try {
      const dataUrl = await readFileAsDataUrl(f);
      if (!state.stagedAssets[area]) state.stagedAssets[area] = {};
      state.stagedAssets[area][file] = dataUrl;
      imgEl.src = dataUrl;
      const assetCell = imgEl.closest(".asset");
      if (assetCell) assetCell.classList.add("pending");
      markDirty();
      setStatus("Staged " + file);
      scheduleRender(true);
    } catch (e) {
      setStatus(String(e.message || e), "err");
    }
  };
  input.click();
}

function isFontUploadName(name) {
  return /\.(otf|ttf)$/i.test(name || "");
}

async function uploadFontFile(file) {
  if (!isFontUploadName(file.name)) {
    throw new Error("Choose a .ttf or .otf font file.");
  }

  const dataUrl = await readFileAsDataUrl(file);
  const current = state.current;
  if (!current) throw new Error("Choose a style before loading a font.");
  const uploaded = await (await api(
    "/api/editor/styles/" + encodeURIComponent(current.section) + "/" + encodeURIComponent(current.name) + "/fonts",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ file: file.name, data: dataUrl.split(",")[1] }),
    }
  )).json();

  state.fonts = uploaded.fonts || state.fonts;
  rebuildStyleFormKeepingOpen();
  buildAssets();
  scheduleRender(true);
  return uploaded;
}

function chooseFontFile() {
  const input = $("#fontFile");
  input.value = "";
  input.onchange = async () => {
    const f = input.files[0];
    if (!f) return;
    setStatus("Loading " + f.name + "...");
    try {
      const uploaded = await uploadFontFile(f);
      const warning = uploaded.restartRecommended ? "; restart server if it does not render" : "";
      setStatus("Loaded font " + uploaded.font + warning, "ok");
    } catch (e) {
      setStatus(String(e.message || e), "err");
    } finally {
      input.value = "";
    }
  };
  input.click();
}

/* ------------------------------------------------------------------- Render */
function buildCardPayload() {
  const c = state.card;
  const isSpellTrap = SPELLTRAP_TEMPLATES.includes(c.template);
  const card = {
    name: c.name || "",
    attribute: c.attribute,
    template: c.template,
    cardText: c.cardText || "",
    art: state.artBase64,
    icon: c.icon || "normal",
    pendulum: !isSpellTrap && !!c.pendulum,
  };
  if (!isSpellTrap) {
    const monsterTypes = normalizeMonsterTypes(c.monsterType).map((type) => type.trim()).filter(Boolean);
    if (monsterTypes.length) card.monsterType = monsterTypes;
    if (Number(c.level) > 0) card.level = Number(c.level);
    if (c.atk !== "" && c.atk != null) card.atk = String(c.atk);
    if (c.template !== "link" && c.def !== "" && c.def != null) card.def = String(c.def);
    if (c.maxAtk !== "" && c.maxAtk != null) card.maxAtk = String(c.maxAtk);
    if (card.pendulum) card.scale = Number(c.scale) || 0;
    if (card.pendulum && c.pendulumText) card.pendulumText = c.pendulumText;
    if (c.template === "link" && c.linkArrows.length) card.linkArrows = c.linkArrows.slice();
  }
  if (c.legend) card.legend = true;
  if (c.fullArt) card.fullArt = true;
  if (c.disableStats) card.disableStats = true;
  if (c.overrushName) card.overrushName = true;
  return card;
}

function scheduleRender(immediate) {
  if (!state.current) return;
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(doRender, immediate ? 0 : 220);
}

async function doRender() {
  if (!state.current) return;
  if (rendering) { renderQueued = true; return; }
  rendering = true;
  setRenderStatus("Rendering…");
  try {
    const body = {
      section: state.current.section,
      style: state.current.name,
      settings: state.settings,
      assets: state.stagedAssets,
      card: buildCardPayload(),
    };
    const res = await api("/api/editor/render", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const img = $("#renderedImg");
    img.onload = () => { if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl); lastObjectUrl = url; };
    img.src = url;
    setRenderStatus("");
  } catch (e) {
    setRenderStatus(String(e.message || e), true);
  } finally {
    rendering = false;
    if (renderQueued) { renderQueued = false; doRender(); }
  }
}

/* --------------------------------------------------------- Sample comparison */
function setSplit(pct) {
  pct = Math.max(0, Math.min(100, pct));
  state.split = pct;
  const renderedImg = $("#renderedImg");
  if ($("#sampleImg").hidden) {
    renderedImg.style.clipPath = "";
  } else {
    renderedImg.style.clipPath = "inset(0 0 0 " + pct + "%)";
    $("#divider").style.left = pct + "%";
  }
}
function setRenderOpacity(pct) {
  pct = Math.max(0, Math.min(100, pct));
  state.renderOpacity = pct;
  $("#renderOpacityRange").value = pct;
  $("#renderedImg").style.opacity = $("#sampleImg").hidden ? "" : String(pct / 100);
}
function initSplitDrag() {
  const compare = $("#compare");
  let dragging = false;
  const update = (e) => {
    const r = compare.getBoundingClientRect();
    setSplit(((e.clientX - r.left) / r.width) * 100);
  };
  compare.addEventListener("pointerdown", (e) => {
    if ($("#sampleImg").hidden) return;
    e.preventDefault();
    dragging = true;
    try { compare.setPointerCapture(e.pointerId); } catch (err) {}
    update(e);
  });
  compare.addEventListener("pointermove", (e) => { if (dragging) { e.preventDefault(); update(e); } });
  compare.addEventListener("pointerup", () => { dragging = false; });
  compare.addEventListener("pointercancel", () => { dragging = false; });
  compare.addEventListener("dragstart", (e) => e.preventDefault());
  $("#renderOpacityRange").addEventListener("input", (e) => {
    if ($("#sampleImg").hidden) return;
    setRenderOpacity(Number(e.target.value));
  });
}

/* -------------------------------------------------------------------- Files */
function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
}

/* ------------------------------------------------------------------- Wiring */
function bindTabs() {
  document.querySelectorAll(".tabs button").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach((b) => b.classList.toggle("active", b === btn));
      ["card","style","assets"].forEach((t) => { $("#panel-" + t).hidden = (t !== btn.dataset.tab); });
    });
  });
}

function bindToolbar() {
  $("#styleTypeSelect").addEventListener("change", async (e) => {
    const selected = syncStyleControls({ section: e.target.value });
    if (!selected) return;
    try { await loadStyle(selected.section, selected.name); setStatus(""); }
    catch (err) { setStatus(String(err.message || err), "err"); }
  });

  $("#styleNameSelect").addEventListener("change", async (e) => {
    const selected = splitStyleKey(e.target.value);
    if (!selected) return;
    try { await loadStyle(selected.section, selected.name); setStatus(""); }
    catch (err) { setStatus(String(err.message || err), "err"); }
  });

  $("#resetBtn").addEventListener("click", async () => {
    if (!state.current) return;
    try { await loadStyle(state.current.section, state.current.name); setStatus("Reset to saved", "ok"); }
    catch (err) { setStatus(String(err.message || err), "err"); }
  });

  $("#saveBtn").addEventListener("click", async () => {
    if (!state.current) return;
    setStatus("Saving…");
    const current = { section: state.current.section, name: state.current.name };
    try {
      await api("/api/editor/styles/" + encodeURIComponent(current.section) + "/" + encodeURIComponent(current.name), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ settings: state.settings, assets: state.stagedAssets }),
      });
      await loadStyle(current.section, current.name);
      setStatus("Saved", "ok");
    } catch (err) { setStatus(String(err.message || err), "err"); }
  });

  $("#zipBtn").addEventListener("click", () => {
    if (!state.current) return;
    const a = document.createElement("a");
    a.href = "/api/editor/styles/" + encodeURIComponent(state.current.section) + "/" + encodeURIComponent(state.current.name) + "/zip";
    a.download = state.current.name + ".zip";
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  $("#loadZipBtn").addEventListener("click", () => $("#zipFile").click());
  $("#zipFile").addEventListener("change", async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setStatus("Importing " + f.name + "…");
    try {
      const dataUrl = await readFileAsDataUrl(f);
      const base64 = dataUrl.split(",")[1];
      const imported = await (await api("/api/editor/import", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: base64 }),
      })).json();
      await loadStyleList();
      await loadStyle(imported.section, imported.name);
      setStatus((imported.overrode ? "Overrode " : "Imported ") + displayStyleRef(imported.section, imported.name), "ok");
    } catch (err) {
      setStatus(String(err.message || err), "err");
    } finally {
      e.target.value = "";
    }
  });

  // Art / sample loaders
  $("#loadArtBtn").addEventListener("click", () => $("#artFile").click());
  $("#artFile").addEventListener("change", async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const dataUrl = await readFileAsDataUrl(f);
    state.artBase64 = dataUrl.split(",")[1];
    state.artLoaded = true;
    buildCardPanel();
    scheduleRender(true);
  });

  $("#loadSampleBtn").addEventListener("click", () => $("#sampleFile").click());
  $("#sampleFile").addEventListener("change", async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const dataUrl = await readFileAsDataUrl(f);
    if (state.sampleUrl) { /* dataUrl, nothing to revoke */ }
    state.sampleUrl = dataUrl;
    const sampleImg = $("#sampleImg");
    sampleImg.src = dataUrl;
    sampleImg.hidden = false;
    $("#divider").hidden = false;
    $("#renderOpacityCtrl").hidden = false;
    $("#clearSampleBtn").hidden = false;
    $("#compare").classList.add("has-sample");
    setSplit(state.split);
    setRenderOpacity(state.renderOpacity);
  });

  $("#clearSampleBtn").addEventListener("click", () => {
    state.sampleUrl = null;
    $("#sampleImg").hidden = true;
    $("#sampleImg").removeAttribute("src");
    $("#divider").hidden = true;
    $("#renderOpacityCtrl").hidden = true;
    $("#clearSampleBtn").hidden = true;
    $("#renderedImg").style.clipPath = "";
    $("#renderedImg").style.opacity = "";
    $("#compare").classList.remove("has-sample");
  });
}

function bindNewDialog() {
  const dlg = $("#newDialog");
  const selectedNewBaseStyle = () => {
    const selected = splitStyleKey($("#newBase").value);
    return selected ? findStyle(selected.section, selected.name) : null;
  };
  const fillNewStyleGrouping = () => {
    const style = selectedNewBaseStyle();
    $("#newSection").value = style ? style.section : "";
    $("#newSeries").value = style ? style.name : "";
  };

  $("#newBtn").addEventListener("click", () => {
    const base = $("#newBase");
    base.innerHTML = "";
    for (const section of availableStyleSections()) {
      const group = document.createElement("optgroup");
      group.label = section;
      const styles = stylesForSection(section);
      for (const s of styles) {
        const opt = document.createElement("option");
        opt.value = styleKey(s);
        opt.textContent = seriesOptionText(s, styles);
        group.appendChild(opt);
      }
      base.appendChild(group);
    }
    if (state.current) base.value = styleKey(state.current);
    fillNewStyleGrouping();
    $("#newError").textContent = "";
    dlg.showModal();
  });

  $("#newBase").addEventListener("change", fillNewStyleGrouping);

  $("#newCreate").addEventListener("click", async (e) => {
    e.preventDefault();
    const selected = splitStyleKey($("#newBase").value);
    if (!selected) return;
    const section = $("#newSection").value.trim();
    const series = $("#newSeries").value.trim();
    if (!isValidStyleName(section) || !isValidStyleName(series)) {
      $("#newError").textContent = "Section and series are required.";
      return;
    }
    try {
      const created = await (await api("/api/editor/styles", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: series, section, from: selected }),
      })).json();
      dlg.close();
      await loadStyleList();
      await loadStyle(created.section, created.name);
      setStatus("Created " + displayStyleRef(created.section, created.name), "ok");
    } catch (err) {
      $("#newError").textContent = String(err.message || err);
    }
  });
}

function bindRenameDialog() {
  const dlg = $("#renameDialog");
  $("#renameBtn").addEventListener("click", () => {
    if (!state.current) return;
    $("#renameName").value = state.current.name;
    $("#renameError").textContent = "";
    dlg.showModal();
    $("#renameName").select();
  });

  $("#renameSave").addEventListener("click", async (e) => {
    e.preventDefault();
    if (!state.current) return;

    const current = { section: state.current.section, name: state.current.name };
    const newName = $("#renameName").value.trim();
    if (!isValidStyleName(newName)) {
      $("#renameError").textContent = "Series name is invalid.";
      return;
    }
    if (newName === current.name) {
      dlg.close();
      return;
    }

    try {
      const renamed = await (await api(
        "/api/editor/styles/" + encodeURIComponent(current.section) + "/" + encodeURIComponent(current.name) + "/rename",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: newName }),
        }
      )).json();
      state.current = { type: renamed.type, section: renamed.section, name: renamed.name };
      await loadStyleList();
      syncStyleControls(state.current);
      buildAssets();
      scheduleRender(true);
      dlg.close();
      setStatus(state.dirty ? "Renamed; unsaved changes" : "Renamed", "ok");
    } catch (err) {
      $("#renameError").textContent = String(err.message || err);
    }
  });
}

/* --------------------------------------------------------------------- Boot */
async function boot() {
  bindTabs();
  bindToolbar();
  bindNewDialog();
  bindRenameDialog();
  initSplitDrag();
  buildCardPanel();
  try {
    await loadStyleList();
    const selected = syncStyleControls(state.current);
    if (!selected) { setStatus("No styles found", "err"); return; }
    await loadStyle(selected.section, selected.name);
  } catch (err) {
    setStatus(String(err.message || err), "err");
  }
}

boot();
</script>
